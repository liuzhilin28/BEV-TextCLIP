# ============================================================
# BEV-TextCLIP NVIDIA Titan RTX GPU 配置文件
# 
# GPU型号：NVIDIA Titan RTX (24GB显存)
# CUDA版本：11.8
# PyTorch版本：2.1.0+
# 
# Author: BY ChangXiu.Huang
# Copyright: ChangXiu.Huang
# Date: 2026-01-25
# ============================================================

# GPU训练配置
dataset: nuscenes
num_classes: 16

# ============================================================
# BEV 配置
# ============================================================
bev_resolution: [200, 200]
bev_channels: 256
num_depth_bins: 4

# ============================================================
# 图像编码器配置（支持多尺度特征）
# ============================================================
image_encoder_type: resnet50
image_pretrained: true
image_freeze: false  # Titan RTX显存充足，可训练

# ============================================================
# 点云编码器配置（PointPillar）
# ============================================================
point_encoder_type: pointpillar
voxel_size: [0.05, 0.05, 0.05]
point_cloud_range: [-20.0, -20.0, -2.0, 20.0, 20.0, 6.0]

# ============================================================
# 文本编码器配置（CLIP）
# ============================================================
text_encoder_type: clip
text_pretrained: true
text_freeze: false  # 可训练以适应特定场景

# ============================================================
# 融合配置
# ============================================================
fusion_type: cross_attention
use_bidirectional_attention: true
num_attention_heads: 8
attention_dropout: 0.1

# ============================================================
# 对比学习配置
# ============================================================
use_contrastive: true
contrastive_weight: 0.5
temperature: 0.07
use_memory_bank: true
memory_size: 65536

# ============================================================
# 训练配置（针对 Titan RTX 优化）
# ============================================================
batch_size: 8  # Titan RTX 24GB显存，可使用较大batch
learning_rate: 0.0001
weight_decay: 0.01
max_epochs: 100
warmup_epochs: 5

optimizer_type: adamw
scheduler_type: cosine

# ============================================================
# 混合精度训练（AMP）
# ============================================================
use_amp: true  # 启用AMP加速

# ============================================================
# 评估和保存配置
# ============================================================
eval_interval: 5
save_interval: 10

# ============================================================
# 数据加载配置
# ============================================================
num_workers: 8  # 多进程数据加载
pin_memory: true

# ============================================================
# 日志配置
# ============================================================
log_interval: 100
wandb_project: "BEV-TextCLIP"
wandb_name: "titan-rtx-experiment"

# ============================================================
# Titan RTX 特定优化
# ============================================================
# GPU内存优化
gradient_accumulation_steps: 1  # 不需要累积梯度
gradient_checkpointing: true    # 启用梯度检查点节省内存

# 多GPU训练（如果有多张Titan RTX）
distributed_training: false
world_size: 1
local_rank: 0
